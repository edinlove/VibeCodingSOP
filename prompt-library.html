<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Library</title>
<link rel="stylesheet" href="styles/prompt-library.css?v=20250604">
</head>
<body>
<div class="library-container">
  <div class="library-toolbar">
    <label for="fileInput" class="open-btn icon-only" id="openBtn" title="打开">
      <img src="assets/icon-open.png" alt="打开">
    </label>
    <span class="file-name" id="fileNameDisplay"></span>
    <input type="file" id="fileInput" accept=".md" style="display:none">
    <div class="toolbar-stats" id="toolbarStats"></div>
  </div>
  <div class="library-content" id="libraryContent">
    <div class="empty-state">正在加载模板库...</div>
  </div>
</div>

<!-- Import / Edit Modal -->
<div class="modal-overlay" id="importModal" style="display:none;">
  <div class="modal-box">
    <div class="modal-header">
      <span id="modalTitle">Prompt模板元数据</span>
      <button class="modal-close" id="modalClose">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <label>模板名称</label>
        <input type="text" id="mTitle" placeholder="请输入模板名称">
      </div>
      <div class="form-row">
        <label>模板类型</label>
        <select id="mType"></select>
      </div>
      <div class="form-row">
        <label>模板标签</label>
        <div class="tag-selector" id="mTags"></div>
      </div>
      <div class="form-row">
        <label>模板作用域</label>
        <select id="mScope">
          <option value="Global">Global</option>
          <option value="Project">Project</option>
          <option value="Task">Task</option>
        </select>
      </div>
      <div class="form-row">
        <label>模板描述</label>
        <textarea id="mDesc" rows="2" placeholder="一句话描述"></textarea>
      </div>
      <div class="form-row">
        <label>模板支持模型</label>
        <input type="text" id="mModel" placeholder="多个模型用逗号分隔">
      </div>
      <div class="form-row">
        <label>模板内容</label>
        <input type="text" id="mContent" readonly class="readonly" placeholder="导入后显示文件路径">
      </div>
      <div class="form-row id-ver-split">
        <div class="field-group id-field">
          <label>模板ID</label>
          <input type="text" id="mId" readonly class="readonly">
        </div>
        <div class="field-group ver-field">
          <label>模板版本号</label>
          <div class="version-inputs">
            <input type="number" id="mVerMajor" placeholder="Major" min="0">
            <span>.</span>
            <input type="number" id="mVerMinor" placeholder="Minor" min="0">
            <span>.</span>
            <input type="number" id="mVerPatch" placeholder="Patch" min="0">
          </div>
        </div>
      </div>
      <div class="form-row">
        <label>模板更新时间</label>
        <input type="text" id="mUpdated" readonly class="readonly">
      </div>
      <div class="form-row compact-row compact-footer">
        <div class="field-group">
          <label class="toggle-switch">
            <span class="toggle-label">生效</span>
            <input type="checkbox" id="mEnabled" checked>
            <span class="slider"></span>
          </label>
        </div>
        <div class="field-group">
          <label class="toggle-switch">
            <span class="toggle-label">收藏</span>
            <input type="checkbox" id="mFavorite">
            <span class="slider"></span>
          </label>
        </div>
        <div class="field-group">
          <label>排序</label>
          <input type="number" id="mOrder" value="1" min="1" style="width:50px;flex:0 0 auto;">
        </div>
        <div class="field-group">
          <label>作者</label>
          <input type="text" id="mAuthor" placeholder="作者" style="width:80px;flex:0 0 auto;">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" id="modalCancel">取消</button>
      <button class="btn-primary" id="modalSave">保存并导入</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast-msg" id="toastMsg"></div>

<script>
(function() {
  'use strict';

  // DOM refs
  var libraryContent = document.getElementById('libraryContent');
  var openBtn = document.getElementById('openBtn');
  var fileInput = document.getElementById('fileInput');
  var fileNameDisplay = document.getElementById('fileNameDisplay');
  var toastEl = document.getElementById('toastMsg');
  var toolbarStats = document.getElementById('toolbarStats');

  // Modal DOM refs
  var importModal = document.getElementById('importModal');
  var modalClose = document.getElementById('modalClose');
  var modalSave = document.getElementById('modalSave');
  var modalCancel = document.getElementById('modalCancel');
  var modalTitle = document.getElementById('modalTitle');
  var mId = document.getElementById('mId');
  var mTitle = document.getElementById('mTitle');
  var mVerMajor = document.getElementById('mVerMajor');
  var mVerMinor = document.getElementById('mVerMinor');
  var mVerPatch = document.getElementById('mVerPatch');
  var mType = document.getElementById('mType');
  var mTags = document.getElementById('mTags');
  var mScope = document.getElementById('mScope');
  var mDesc = document.getElementById('mDesc');
  var mModel = document.getElementById('mModel');
  var mContent = document.getElementById('mContent');
  var mOrder = document.getElementById('mOrder');
  var mEnabled = document.getElementById('mEnabled');
  var mFavorite = document.getElementById('mFavorite');
  var mAuthor = document.getElementById('mAuthor');
  var mUpdated = document.getElementById('mUpdated');

  // State
  var config = null;
  var library = null;
  var typeMap = {};   // typeValue -> typeName
  var tagMap = {};    // tagValue -> tagName
  var currentMdFile = null;
  var currentMdContent = '';
  var editTemplateId = null;  // null = import mode, string = edit mode
  var isEditMode = false;

  // Utility
  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    setTimeout(function() { toastEl.classList.remove('show'); }, 2000);
  }

  function getTypeName(type) {
    return (typeMap[type] || type);
  }

  function getTagNames(tags) {
    if (!Array.isArray(tags)) return [];
    return tags.map(function(t) { return tagMap[t] || t; });
  }

  function formatVersion(v) {
    if (!v || typeof v !== 'object') return '';
    return (v.major || 0) + '.' + (v.minor || 0) + '.' + (v.patch || 0);
  }

  function escapeHtml(str) {
    if (str == null) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function now() {
    var d = new Date();
    var pad = function(n) { return n < 10 ? '0' + n : n; };
    return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
  }

  // Fetch config and library
  function loadLibrary() {
    Promise.all([
      fetch('/api/prompt/config').then(function(r) { return r.json(); }),
      fetch('/api/prompt/library').then(function(r) { return r.json(); })
    ]).then(function(results) {
      config = results[0];
      library = results[1];

      // Build type/tag maps
      typeMap = {};
      if (config && config.promptTemplateType && Array.isArray(config.promptTemplateType)) {
        config.promptTemplateType.forEach(function(t) {
          typeMap[t.id] = t.promptTemplateTypeName || t.id;
        });
      }
      tagMap = {};
      if (config && config.promptTemplateTags && Array.isArray(config.promptTemplateTags)) {
        config.promptTemplateTags.forEach(function(t) {
          tagMap[t.id] = t.promptTemplateTagName || t.id;
        });
      }

      // Init modal form options
      mType.innerHTML = '';
      if (config && config.promptTemplateType && Array.isArray(config.promptTemplateType)) {
        config.promptTemplateType.forEach(function(t) {
          var opt = document.createElement('option');
          opt.value = t.id;
          opt.textContent = t.promptTemplateTypeName || t.id;
          mType.appendChild(opt);
        });
      }
      if (config && config.promptTemplateTags && Array.isArray(config.promptTemplateTags)) {
        buildMultiSelect(mTags, config.promptTemplateTags);
      }

      renderLibrary();
    }).catch(function(err) {
      console.error('Failed to load library:', err);
      libraryContent.innerHTML = '<div class="empty-state">加载失败: ' + escapeHtml(err.message) + '</div>';
    });
  }

  // Render library
  // preserveState: true = keep current collapse/expand state
  function renderLibrary(preserveState) {
    // Save current collapse state
    var collapseState = {};
    if (preserveState) {
      document.querySelectorAll('.group-header').forEach(function(h) {
        collapseState[h.getAttribute('data-group')] = h.classList.contains('collapsed');
      });
    }

    // Build group map from config types (always show all groups)
    var groups = {};
    if (config && config.promptTemplateType && Array.isArray(config.promptTemplateType)) {
      config.promptTemplateType.forEach(function(t) {
        groups[t.id] = [];
      });
    }

    // Populate with templates
    if (library && library.template && Array.isArray(library.template)) {
      library.template.forEach(function(t) {
        if (t.promptTemplateEnabled === false) return; // hide disabled
        var type = t.promptTemplateType || 'Unknown';
        if (!groups[type]) groups[type] = [];
        groups[type].push(t);
      });
    }

    // Sort templates within each group by favorites first, then order
    Object.keys(groups).forEach(function(type) {
      groups[type].sort(function(a, b) {
        if (a.promptTemplateFavorite && !b.promptTemplateFavorite) return -1;
        if (!a.promptTemplateFavorite && b.promptTemplateFavorite) return 1;
        var oa = a.promptTemplateTypeOrder || 999;
        var ob = b.promptTemplateTypeOrder || 999;
        return oa - ob;
      });
    });

    // Get type order from config
    var typeOrder = {};
    if (config && config.promptTemplateType) {
      config.promptTemplateType.forEach(function(t, i) {
        typeOrder[t.id] = t.order || i;
      });
    }

    // Sort group keys by type order
    var groupKeys = Object.keys(groups).sort(function(a, b) {
      return (typeOrder[a] || 999) - (typeOrder[b] || 999);
    });

    var html = '';
    groupKeys.forEach(function(type) {
      var templates = groups[type];
      var typeName = getTypeName(type);
      var hasTemplates = templates.length > 0;
      var isCollapsed = preserveState ? collapseState[type] !== false : true;
      html += '<div class="template-group">';
      html += '<div class="group-header ' + (isCollapsed ? 'collapsed' : '') + '" data-group="' + escapeHtml(type) + '">';
      html += '<img class="group-type-icon" src="assets/icon-template-typegroup.png" alt="' + escapeHtml(typeName) + '">';
      html += '<span class="group-name">' + escapeHtml(typeName) + '</span>';
      html += '<span class="group-count">(' + templates.length + ')</span>';
      html += '<span class="group-toggle">';
      html += '<img class="group-toggle-icon" src="assets/icon-template-expand-' + (isCollapsed ? 'down' : 'up') + '.png" alt="' + (isCollapsed ? '展开' : '折叠') + '">';
      html += '</span>';
      html += '</div>';
      html += '<div class="group-content ' + (isCollapsed ? 'hidden' : '') + '" data-group-content="' + escapeHtml(type) + '">';
      if (hasTemplates) {
        templates.forEach(function(t) {
          html += renderTemplateCard(t);
        });
      } else {
        html += '<div class="group-empty">该分组下暂无模板，待添加。</div>';
      }
      html += '</div></div>';
    });

    if (groupKeys.length === 0) {
      libraryContent.innerHTML = '<div class="empty-state">暂无配置信息</div>';
      return;
    }

    libraryContent.innerHTML = html;

    // Bind group toggle events
    document.querySelectorAll('.group-header').forEach(function(header) {
      header.addEventListener('click', function() {
        var group = header.getAttribute('data-group');
        var content = document.querySelector('[data-group-content="' + group + '"]');
        var icon = header.querySelector('.group-toggle-icon');
        header.classList.toggle('collapsed');
        content.classList.toggle('hidden');
        if (icon) {
          if (content.classList.contains('hidden')) {
            icon.src = 'assets/icon-template-expand-down.png';
            icon.alt = '展开';
          } else {
            icon.src = 'assets/icon-template-expand-up.png';
            icon.alt = '折叠';
          }
        }
      });
    });

    // Update toolbar stats
    updateToolbarStats();
  }

  function updateToolbarStats() {
    if (!library || !library.template) return;
    var all = library.template;
    var enabled = all.filter(function(t) { return t.promptTemplateEnabled !== false; }).length;
    var fav = all.filter(function(t) { return t.promptTemplateFavorite === true; }).length;
    var groupCount = 0;
    if (config && config.promptTemplateType) groupCount = config.promptTemplateType.length;
    toolbarStats.innerHTML = '<span class="stat-pill">分组 ' + groupCount + '</span><span class="stat-pill">模板 ' + all.length + '</span><span class="stat-pill">生效 ' + enabled + '</span><span class="stat-pill">收藏 ' + fav + '</span>';
  }

  function renderTemplateCard(t) {
    var title = t.promptTemplateTitle || '未命名';
    var version = formatVersion(t.promptTemplateVersion);
    var tags = getTagNames(t.promptTemplateTags);
    var scope = t.promptTemplateScope || '';
    var desc = t.promptTemplateDescription || '';
    var model = '';
    if (Array.isArray(t.promptTemplateModel)) {
      model = t.promptTemplateModel.join(', ');
    } else if (t.promptTemplateModel) {
      model = String(t.promptTemplateModel);
    }
    var isFav = t.promptTemplateFavorite;

    var html = '<div class="template-card" data-id="' + escapeHtml(t.promptTemplateID || '') + '">';
    html += '<div class="card-header">';
    html += '<span class="card-title" title="' + escapeHtml(title) + '">' + escapeHtml(title) + '</span>';
    html += '<div class="card-header-right">';
    html += '<span class="card-version">' + escapeHtml(version) + '</span>';
    html += '<button class="fav-btn ' + (isFav ? 'active' : '') + '" data-id="' + escapeHtml(t.promptTemplateID || '') + '" title="收藏">';
    html += '<img src="assets/' + (isFav ? 'icon-like-done.png' : 'icon-like.png') + '" alt="收藏">';
    html += '</button>';
    html += '</div>';
    html += '</div>';
    html += '<div class="card-meta">';
    tags.forEach(function(tag) {
      html += '<span class="meta-tag">' + escapeHtml(tag) + '</span>';
    });
    if (tags.length === 0) {
      html += '<span class="meta-tag">无标签</span>';
    }
    html += '</div>';
    if (desc) {
      html += '<div class="card-desc" title="' + escapeHtml(desc) + '">' + escapeHtml(desc) + '</div>';
    }
    html += '<div class="card-footer">';
    html += '<span class="card-scope">' + escapeHtml(scope) + (model ? ' | ' + escapeHtml(model) : '') + '</span>';
    html += '<div class="card-actions">';
    html += '<button class="icon-btn edit-btn" data-id="' + escapeHtml(t.promptTemplateID || '') + '" title="编辑">';
    html += '<img src="assets/icon-edit-node-info.png" alt="编辑">';
    html += '</button>';
    html += '</div>';
    html += '</div>';
    html += '</div>';
    return html;
  }

  // File input - import md file
  fileInput.addEventListener('change', function(e) {
    var file = e.target.files[0];
    if (!file) return;
    if (!config) {
      showToast('配置加载失败，请刷新页面重试');
      return;
    }
    fileNameDisplay.textContent = file.name;
    currentMdFile = file;
    currentMdContent = '';
    var reader = new FileReader();
    reader.onload = function(evt) {
      currentMdContent = evt.target.result;
      openImportModal(file.name);
      // Reset input so same file can be selected again
      fileInput.value = '';
    };
    reader.onerror = function() {
      showToast('文件读取失败');
      fileInput.value = '';
    };
    reader.readAsText(file);
  });

  // Modal handling
  function openImportModal(fileName) {
    modalTitle.textContent = 'Prompt模板元数据';
    modalSave.textContent = '保存并导入';
    isEditMode = false;
    editTemplateId = null;
    mId.value = generateNextId();
    mTitle.value = '';
    mVerMajor.value = 1; mVerMinor.value = 0; mVerPatch.value = 0;
    mType.value = (config && config.promptTemplateType && config.promptTemplateType[0]) ? config.promptTemplateType[0].id : '';
    clearMultiSelect(mTags);
    mScope.value = 'Global';
    mDesc.value = '';
    mModel.value = '';
    mContent.value = '';
    mOrder.value = 1;
    mEnabled.checked = true;
    mFavorite.checked = false;
    mAuthor.value = '';
    mUpdated.value = now();
    importModal.style.display = 'flex';
  }

  function openEditModal(template) {
    modalTitle.textContent = '编辑模板';
    modalSave.textContent = '保存';
    isEditMode = true;
    editTemplateId = template.promptTemplateID;
    mId.value = template.promptTemplateID;
    mTitle.value = template.promptTemplateTitle || '';
    mVerMajor.value = (template.promptTemplateVersion && template.promptTemplateVersion.major) || 1;
    mVerMinor.value = (template.promptTemplateVersion && template.promptTemplateVersion.minor) || 0;
    mVerPatch.value = (template.promptTemplateVersion && template.promptTemplateVersion.patch) || 0;
    mType.value = template.promptTemplateType || '';
    setMultiSelect(mTags, template.promptTemplateTags || []);
    mScope.value = template.promptTemplateScope || 'Global';
    mDesc.value = template.promptTemplateDescription || '';
    mModel.value = (template.promptTemplateModel || []).join(', ');
    mContent.value = (template.promptTemplateContent && template.promptTemplateContent.file) || '';
    mOrder.value = template.promptTemplateTypeOrder || 1;
    mEnabled.checked = template.promptTemplateEnabled !== false;
    mFavorite.checked = template.promptTemplateFavorite === true;
    mAuthor.value = (template.promptTemplateMetadata && template.promptTemplateMetadata.promptTemplateAuthor) || '';
    mUpdated.value = now();
    importModal.style.display = 'flex';
  }

  function closeModal() {
    importModal.style.display = 'none';
    fileInput.value = '';
    currentMdContent = '';
  }

  modalClose.addEventListener('click', closeModal);
  modalCancel.addEventListener('click', closeModal);
  importModal.addEventListener('click', function(e) {
    if (e.target === importModal) closeModal();
  });

  modalSave.addEventListener('click', function() {
    var title = mTitle.value.trim();
    if (!title) { showToast('模板名称不能为空'); return; }

    var major = parseInt(mVerMajor.value) || 0;
    var minor = parseInt(mVerMinor.value) || 0;
    var patch = parseInt(mVerPatch.value) || 0;
    var versionStr = major + '.' + minor + '.' + patch;
    var dateStr = now().slice(0, 10).replace(/-/g, '');
    var fileName = title + '-' + versionStr + '-' + dateStr + '.md';

    var templateObj = {
      promptTemplateID: mId.value,
      promptTemplateTitle: title,
      promptTemplateVersion: { major: major, minor: minor, patch: patch },
      promptTemplateType: mType.value,
      promptTemplateTags: getMultiSelectValues(mTags),
      promptTemplateScope: mScope.value,
      promptTemplateDescription: mDesc.value.trim(),
      promptTemplateModel: mModel.value.split(',').map(function(s) { return s.trim(); }).filter(function(s) { return s; }),
      promptTemplateContent: { file: './prompt/template/' + fileName },
      promptTemplateTypeOrder: parseInt(mOrder.value) || 1,
      promptTemplateEnabled: mEnabled.checked,
      promptTemplateFavorite: mFavorite.checked,
      promptTemplateMetadata: {
        promptTemplateAuthor: mAuthor.value.trim(),
        promptTemplateUpdatedTime: now()
      }
    };

    if (isEditMode) {
      var idx = library.template.findIndex(function(t) { return t.promptTemplateID === editTemplateId; });
      if (idx !== -1) {
        library.template[idx] = templateObj;
      }
    } else {
      library.template.push(templateObj);
    }

    var promises = [
      fetch('/api/prompt/library', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(library)
      })
    ];

    if (!isEditMode && currentMdContent) {
      promises.push(
        fetch('/api/prompt/template', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ fileName: fileName, content: currentMdContent })
        })
      );
    }

    Promise.all(promises).then(function(responses) {
      return Promise.all(responses.map(function(r) { return r.json(); }));
    }).then(function(results) {
      var libOk = results[0] && results[0].success;
      var tplOk = isEditMode || (results[1] && results[1].success);
      if (libOk && tplOk) {
        showToast(isEditMode ? '模板更新成功' : 'PromptTemplate上传、保存、导入成功');
        closeModal();
        fileNameDisplay.textContent = '';
        renderLibrary();
      } else {
        var err = (results[0] && results[0].error) || (results[1] && results[1].error) || '未知错误';
        showToast('保存失败: ' + err);
      }
    }).catch(function(err) {
      showToast('保存失败: ' + err.message);
    });
  });

  // Tag selector helpers
  function buildMultiSelect(container, options) {
    container.innerHTML = '';
    options.forEach(function(opt) {
      var pill = document.createElement('span');
      pill.className = 'tag-pill';
      pill.setAttribute('data-value', opt.id);
      pill.innerHTML = '<span class="check">&#10003;</span>' + escapeHtml(opt.promptTemplateTagName || opt.id);
      pill.addEventListener('click', function() {
        pill.classList.toggle('active');
      });
      container.appendChild(pill);
    });
  }

  function clearMultiSelect(container) {
    var pills = container.querySelectorAll('.tag-pill');
    pills.forEach(function(pill) { pill.classList.remove('active'); });
  }

  function setMultiSelect(container, values) {
    var pills = container.querySelectorAll('.tag-pill');
    pills.forEach(function(pill) {
      pill.classList.toggle('active', values.indexOf(pill.getAttribute('data-value')) !== -1);
    });
  }

  function getMultiSelectValues(container) {
    var values = [];
    var pills = container.querySelectorAll('.tag-pill.active');
    pills.forEach(function(pill) { values.push(pill.getAttribute('data-value')); });
    return values;
  }

  function generateNextId() {
    var max = 0;
    library.template.forEach(function(t) {
      var match = t.promptTemplateID.match(/^p-(\d+)$/);
      if (match) {
        var n = parseInt(match[1]);
        if (n > max) max = n;
      }
    });
    return 'p-' + (max + 1);
  }

  // Card button delegation (edit + favorite)
  libraryContent.addEventListener('click', function(e) {
    var favBtn = e.target.closest('.fav-btn');
    if (favBtn) {
      e.stopPropagation();
      var id = favBtn.getAttribute('data-id');
      var tpl = library.template.find(function(t) { return t.promptTemplateID === id; });
      if (!tpl) return;
      tpl.promptTemplateFavorite = !tpl.promptTemplateFavorite;
      fetch('/api/prompt/library', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(library)
      }).then(function(r) { return r.json(); }).then(function(res) {
        if (res.success) {
          showToast(tpl.promptTemplateFavorite ? '已收藏' : '已取消收藏');
          renderLibrary(true);
        } else {
          showToast('操作失败: ' + (res.error || '未知错误'));
        }
      }).catch(function(err) {
        showToast('操作失败: ' + err.message);
      });
      return;
    }

    var btn = e.target.closest('.edit-btn');
    if (!btn) return;
    var id = btn.getAttribute('data-id');
    var tpl = library.template.find(function(t) { return t.promptTemplateID === id; });
    if (tpl) openEditModal(tpl);
  });

  // Init
  loadLibrary();

})();
</script>
