<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>History Log</title>
  <link rel="stylesheet" href="styles/prompt-historylog.css?v=2">
  <script src="assets/marked.min.js" defer></script>
</head>
<body>
  <div class="hl-container">
    <!-- 搜索栏 -->
    <div class="hl-search-bar">
      <div class="hl-search-left">
        <select class="hl-search-select" id="searchType">
          <option value="keyword">关键字</option>
          <option value="uuid">UUID</option>
        </select>
        <div class="hl-search-input-wrap" id="searchInputWrap">
          <input type="text" class="hl-search-input" id="searchInput" placeholder="输入关键字">
        </div>
      </div>
      <div class="hl-search-actions">
        <button class="hl-search-btn" id="searchBtn">搜索</button>
        <button class="hl-search-btn hl-search-clear" id="clearSearchBtn">清空</button>
      </div>
    </div>

    <!-- 结果区域 -->
    <div class="hl-result-area">
      <!-- 文件列表 -->
      <div class="hl-list-panel">
        <div class="hl-list-header">
          <span>文件列表</span>
          <span class="hl-list-count" id="listCount"></span>
        </div>
        <div class="hl-list-body" id="fileListBody">
          <div class="hl-placeholder">加载中...</div>
        </div>
        <div class="hl-pagination" id="pagination"></div>
      </div>

      <!-- 内容预览 -->
      <div class="hl-preview-panel">
        <div class="hl-preview-header">
          <span>内容预览</span>
          <span class="hl-preview-filename" id="previewFileName"></span>
        </div>
        <div class="hl-preview-body" id="previewBody">
          <div class="hl-preview-main" id="previewMain">
            <div class="hl-placeholder">点击左侧文件查看内容</div>
          </div>
          <button class="hl-toc-toggle-btn" id="hlTocToggleBtn" data-collapsed="false" title="折叠目录">
            <img src="./assets/icon-contentsindex-fold.png" alt="折叠" class="toc-fold-icon" />
            <img src="./assets/icon-contentsindex-unfold.png" alt="展开" class="toc-unfold-icon" style="display:none;" />
          </button>
          <div class="hl-toc-wrapper" id="hlTocWrapper">
            <div class="hl-toc-content" id="hlTocContent"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
  (function() {
    var currentPage = 1;
    var pageSize = 30;
    var currentSearchType = 'keyword';
    var currentSearchValue = '';
    var selectedFile = null;
    var hlTocHeadings = [];

    // ========== 搜索类型切换 ==========
    function onSearchTypeChange() {
      currentSearchType = document.getElementById('searchType').value;
      var wrap = document.getElementById('searchInputWrap');
      if (currentSearchType === 'uuid') {
        wrap.innerHTML = '<input type="text" class="hl-search-input" id="searchInput" placeholder="输入UUID">';
      } else {
        wrap.innerHTML = '<input type="text" class="hl-search-input" id="searchInput" placeholder="输入关键字">';
      }
    }

    document.getElementById('searchType').addEventListener('change', onSearchTypeChange);

    // ========== 加载历史记录 ==========
    function loadHistoryLog(page) {
      currentPage = page;
      var url = '/api/prompt/historylog?page=' + page + '&limit=' + pageSize;
      if (currentSearchValue) {
        url += '&searchType=' + encodeURIComponent(currentSearchType) + '&search=' + encodeURIComponent(currentSearchValue);
      }
      fetch(url)
        .then(function(res) { return res.json(); })
        .then(function(data) {
          renderFileList(data.files || []);
          renderPagination(data.totalPages || 1, data.page || 1);
          document.getElementById('listCount').textContent = '共 ' + (data.total || 0) + ' 条';
        })
        .catch(function(err) {
          document.getElementById('fileListBody').innerHTML = '<div class="hl-placeholder">加载失败</div>';
        });
    }

    // ========== 格式化时间 ==========
    function formatTime(ts) {
      var d = new Date(ts);
      var yyyy = d.getFullYear();
      var mm = String(d.getMonth() + 1).padStart(2, '0');
      var dd = String(d.getDate()).padStart(2, '0');
      var hh = String(d.getHours()).padStart(2, '0');
      var mi = String(d.getMinutes()).padStart(2, '0');
      var ss = String(d.getSeconds()).padStart(2, '0');
      return yyyy + '-' + mm + '-' + dd + ' ' + hh + ':' + mi + ':' + ss;
    }

    // ========== 渲染文件列表 ==========
    function renderFileList(files) {
      var body = document.getElementById('fileListBody');
      if (files.length === 0) {
        body.innerHTML = '<div class="hl-placeholder">暂无历史记录</div>';
        return;
      }
      var html = '';
      files.forEach(function(f) {
        var isSelected = selectedFile === f.name ? ' selected' : '';
        html += '<div class="hl-file-item' + isSelected + '" data-file="' + f.name + '">' +
                '<div class="hl-file-main">' +
                '<span class="hl-file-name">' + f.name + '</span>' +
                '<span class="hl-file-time">' + formatTime(f.time) + '</span>' +
                '</div>' +
                '<button class="hl-export-btn" data-file="' + f.name + '" title="导出History Log文件">' +
                '<img src="./assets/icon-table-export.png" alt="导出">' +
                '</button>' +
                '</div>';
      });
      body.innerHTML = html;
      body.querySelectorAll('.hl-file-item').forEach(function(item) {
        item.addEventListener('click', function(e) {
          if (e.target.closest('.hl-export-btn')) return;
          var file = this.getAttribute('data-file');
          selectedFile = file;
          body.querySelectorAll('.hl-file-item').forEach(function(el) { el.classList.remove('selected'); });
          this.classList.add('selected');
          loadFileContent(file);
        });
      });
      body.querySelectorAll('.hl-export-btn').forEach(function(btn) {
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          var file = this.getAttribute('data-file');
          exportFile(file);
        });
        btn.addEventListener('mouseenter', function() {
          showToast(this.getAttribute('title') || '导出History Log文件', 2000);
        });
      });
    }

    // ========== 渲染分页 ==========
    function renderPagination(totalPages, page) {
      var el = document.getElementById('pagination');
      if (totalPages <= 1) { el.innerHTML = ''; return; }
      var html = '';
      // Prev
      if (page > 1) {
        html += '<span class="hl-page-num" data-page="' + (page - 1) + '">上一页</span>';
      }
      // Page numbers (show max 10)
      var startPage = Math.max(1, page - 4);
      var endPage = Math.min(totalPages, startPage + 9);
      if (endPage - startPage < 9) { startPage = Math.max(1, endPage - 9); }
      for (var i = startPage; i <= endPage; i++) {
        html += '<span class="hl-page-num ' + (i === page ? 'active' : '') + '" data-page="' + i + '">' + i + '</span>';
      }
      // Next
      if (page < totalPages) {
        html += '<span class="hl-page-num" data-page="' + (page + 1) + '">下一页</span>';
      }
      el.innerHTML = html;
      el.querySelectorAll('.hl-page-num').forEach(function(p) {
        p.addEventListener('click', function() {
          currentPage = parseInt(this.getAttribute('data-page'));
          loadHistoryLog(currentPage);
        });
      });
    }

    // ========== 加载文件内容 ==========
    function loadFileContent(fileName) {
      document.getElementById('previewFileName').textContent = fileName;
      fetch('/api/prompt/historylog/' + encodeURIComponent(fileName))
        .then(function(res) { return res.json(); })
        .then(function(data) {
          var content = data.content || '';
          var isMd = fileName.toLowerCase().endsWith('.md');
          if (isMd && typeof marked !== 'undefined') {
            var tocData = generateTocData(content);
            hlTocHeadings = tocData.headings;
            var htmlWithAnchors = addHeadingAnchors(content, tocData.headings);
            var html = marked.parse(htmlWithAnchors);
            document.getElementById('previewMain').innerHTML = '<div class="hl-md-content">' + html + '</div>';
            document.getElementById('hlTocContent').innerHTML = tocData.html;
            document.getElementById('hlTocWrapper').style.display = tocData.headings.length > 0 ? 'flex' : 'none';
            document.getElementById('hlTocToggleBtn').style.display = tocData.headings.length > 0 ? 'flex' : 'none';
          } else {
            document.getElementById('previewMain').innerHTML = '<pre class="hl-preview-content">' + escapeHtml(content) + '</pre>';
            document.getElementById('hlTocContent').innerHTML = '';
            document.getElementById('hlTocWrapper').style.display = 'none';
            document.getElementById('hlTocToggleBtn').style.display = 'none';
          }
        })
        .catch(function(err) {
          document.getElementById('previewMain').innerHTML = '<div class="hl-placeholder">加载失败</div>';
        });
    }

    // Generate TOC data and HTML
    function generateTocData(mdText) {
      var lines = mdText.split('\n');
      var headings = [];
      var tocHtml = '<div class="hl-toc-title">目录</div><ul class="hl-toc-list">';
      var hasHeadings = false;
      lines.forEach(function(line, idx) {
        var match = line.match(/^(#{1,3})\s+(.+)$/);
        if (match) {
          hasHeadings = true;
          var level = match[1].length;
          var text = match[2].replace(/<[^>]+>/g, '').trim();
          var anchor = 'toc-hl-' + headings.length;
          headings.push({ level: level, text: text, id: anchor, lineIdx: idx });
          var indent = (level - 1) * 16;
          tocHtml += '<li class="hl-toc-item" style="padding-left:' + indent + 'px;"><a href="#" data-toc-idx="' + (headings.length - 1) + '">' + text + '</a></li>';
        }
      });
      tocHtml += '</ul>';
      return { headings: headings, html: hasHeadings ? tocHtml : '' };
    }

    // Add heading anchors to markdown text before parsing
    function addHeadingAnchors(mdText, headings) {
      var lines = mdText.split('\n');
      headings.forEach(function(h) {
        if (lines[h.lineIdx]) {
          lines[h.lineIdx] = lines[h.lineIdx] + ' <a id="' + h.id + '"></a>';
        }
      });
      return lines.join('\n');
    }

    // TOC click handler
    document.getElementById('hlTocContent').addEventListener('click', function(e) {
      var target = e.target;
      if (target.tagName === 'A' && target.hasAttribute('data-toc-idx')) {
        e.preventDefault();
        var idx = parseInt(target.getAttribute('data-toc-idx'), 10);
        var heading = hlTocHeadings[idx];
        if (heading) {
          var el = document.getElementById(heading.id);
          if (el) {
            el.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }
        }
      }
    });

    // TOC toggle
    var hlTocToggleBtn = document.getElementById('hlTocToggleBtn');
    var hlTocWrapper = document.getElementById('hlTocWrapper');
    function toggleHlToc() {
      if (!hlTocToggleBtn || !hlTocWrapper) return;
      var isCollapsed = hlTocToggleBtn.getAttribute('data-collapsed') === 'true';
      var foldIcon = hlTocToggleBtn.querySelector('.toc-fold-icon');
      var unfoldIcon = hlTocToggleBtn.querySelector('.toc-unfold-icon');
      if (isCollapsed) {
        hlTocWrapper.classList.remove('collapsed');
        hlTocWrapper.style.display = 'flex';
        hlTocToggleBtn.setAttribute('data-collapsed', 'false');
        hlTocToggleBtn.setAttribute('title', '折叠目录');
        if (foldIcon) foldIcon.style.display = 'block';
        if (unfoldIcon) unfoldIcon.style.display = 'none';
      } else {
        hlTocWrapper.classList.add('collapsed');
        hlTocWrapper.style.display = 'none';
        hlTocToggleBtn.setAttribute('data-collapsed', 'true');
        hlTocToggleBtn.setAttribute('title', '展开目录');
        if (foldIcon) foldIcon.style.display = 'none';
        if (unfoldIcon) unfoldIcon.style.display = 'block';
      }
    }
    if (hlTocToggleBtn) {
      hlTocToggleBtn.addEventListener('click', toggleHlToc);
    }

    function escapeHtml(text) {
      var div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function exportFile(fileName) {
      fetch('/api/prompt/historylog/' + encodeURIComponent(fileName))
        .then(function(res) { return res.json(); })
        .then(function(data) {
          var blob = new Blob([data.content || ''], {type: 'text/plain;charset=utf-8'});
          var url = URL.createObjectURL(blob);
          var a = document.createElement('a');
          a.href = url;
          a.download = fileName;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
          showToast('已导出：' + fileName, 2000);
        })
        .catch(function(err) {
          showToast('导出失败', 2000);
        });
    }

    function showToast(msg, duration) {
      var existing = document.querySelector('.hl-toast');
      if (existing) existing.remove();
      var toast = document.createElement('div');
      toast.className = 'hl-toast';
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(function() {
        toast.classList.add('show');
      }, 10);
      setTimeout(function() {
        toast.classList.remove('show');
        setTimeout(function() { toast.remove(); }, 300);
      }, duration || 2000);
    }

    // ========== 搜索 ==========
    function doSearch() {
      var input = document.getElementById('searchInput');
      currentSearchValue = input ? (input.value || '') : '';
      currentPage = 1;
      loadHistoryLog(1);
    }

    function clearSearch() {
      currentSearchValue = '';
      currentPage = 1;
      onSearchTypeChange();
      loadHistoryLog(1);
    }

    document.getElementById('searchBtn').addEventListener('click', doSearch);
    document.getElementById('clearSearchBtn').addEventListener('click', clearSearch);

    // ========== 初始化 ==========
    onSearchTypeChange();
    loadHistoryLog(1);
  })();
  </script>
</body>
</html>
